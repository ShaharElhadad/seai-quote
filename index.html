<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>הצעת מחיר · seai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Heebo',-apple-system,Arial,sans-serif;background:#f5f5f5;color:#1a1a2e;direction:rtl;padding:20px 12px}
  .page{max-width:760px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.08)}
  .header{background:#1a1a2e;padding:40px 44px 30px;color:#fff}
  .header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:26px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:26px}
  .doc-info-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px}
  .doc-info-value{font-size:13px;color:rgba(255,255,255,.85);text-align:left}
  .doc-type{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:10px}
  .project-title{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
  .project-sub{font-size:14px;color:rgba(255,255,255,.5);font-weight:300}
  .logo{height:40px;width:auto;filter:brightness(0) invert(1)}
  .accent-bar{height:4px;background:linear-gradient(90deg,#F97316,#fb923c,transparent)}
  .signature-section{padding:8px 44px 8px;display:flex;justify-content:flex-start}
  .signature-box{min-width:220px}
  .signature-label{font-size:13px;color:#6b7280;margin-bottom:8px}
  .signature-img{width:140px;height:auto;display:block;margin-bottom:4px}
  .signature-line{border-top:1px solid #1a1a2e;width:200px;margin:0 0 6px}
  .signature-name{font-size:13px;font-weight:600;color:#1a1a2e}
  .signature-title{font-size:12px;color:#9ca3af;margin-top:2px}
  .body{padding:36px 44px}
  .section-label{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#9ca3af;margin-bottom:16px}
  .intro-section{margin-bottom:30px}
  .intro-title{font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:8px}
  .intro-text{font-size:14px;color:#374151;line-height:1.8}
  .feature-table{width:100%;border-collapse:collapse;margin-bottom:30px}
  .feature-table thead tr{border-bottom:2px solid #1a1a2e}
  .feature-table th{padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#6b7280;text-align:right}
  .feature-table tbody tr{border-bottom:1px solid #f0f0f0}
  .feature-table tbody tr:last-child{border-bottom:none}
  .feature-name{padding:14px;font-size:14px;font-weight:600;color:#1a1a2e;width:30%;vertical-align:top}
  .feature-desc{padding:14px;font-size:14px;color:#374151;line-height:1.7;vertical-align:top}
  .cat-table{width:100%;border-collapse:collapse;margin-bottom:30px}
  .cat-table thead tr{border-bottom:2px solid #1a1a2e}
  .cat-table th{padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#6b7280;text-align:right}
  .cat-table th.amt-col{text-align:left}
  .cat-table th.pct-col{text-align:center}
  .cat-table tbody tr{border-bottom:1px solid #f0f0f0}
  .cat-table tbody tr:last-child{border-bottom:none}
  .cat-name{padding:14px;font-size:15px;font-weight:500;color:#1a1a2e;vertical-align:top}
  .cat-pct{padding:14px;text-align:center;font-size:14px;color:#6b7280;vertical-align:top;white-space:nowrap}
  .cat-amt{padding:14px;text-align:left;font-size:15px;font-weight:600;color:#1a1a2e;vertical-align:top;white-space:nowrap}
  .summary-section{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #e5e7eb}
  .summary-row:last-child{border-bottom:none}
  .summary-label{font-size:14px;color:#6b7280}
  .summary-value{font-size:16px;font-weight:600;color:#1a1a2e}
  .summary-row.total .summary-label{font-weight:700;color:#1a1a2e;font-size:15px}
  .summary-row.total .summary-value{color:#F97316;font-size:22px;font-weight:700}
  .notes-section{margin-top:32px;border-top:1px solid #e5e7eb;padding-top:24px}
  .nt-h{font-weight:700;color:#1a1a2e;font-size:14px;margin:16px 0 6px}
  .nt-h:first-child{margin-top:0}
  .nt-l{font-size:13px;line-height:1.9;color:#6b7280}
  .meta{color:rgba(255,255,255,.6);font-size:12px;margin-top:6px}
  .accept-box{margin-top:30px;background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:22px}
  .name-input{width:100%;padding:13px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:12px}
  .accept-btn{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(180deg,#F97316,#ea580c);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
  .accept-btn:disabled{opacity:.6}
  .fineprint{color:#9ca3af;font-size:12px;text-align:center;margin-top:10px}
  .banner{margin-top:24px;padding:16px;border-radius:12px;text-align:center;font-size:15px;font-weight:600}
  .banner.ok{background:#ecfdf5;color:#047857}
  .banner.bad{background:#fef2f2;color:#b91c1c}
  .footer{padding:22px 40px 28px;text-align:center;color:#9ca3af;font-size:12px;border-top:1px solid #f1f2f4}
  .loading{padding:60px 20px;text-align:center;color:#9ca3af}
</style>
</head>
<body>
  <div id="root" class="page"><div class="loading">טוען…</div></div>

<script>
const FUNCTION_URL = "https://puvtgnhrilyabqgtwnmg.supabase.co/functions/v1/quote-public";
const money = a => "₪" + ((a || 0) / 100).toLocaleString("he-IL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = s => (s ?? "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const token = new URLSearchParams(location.search).get("token");
const root = document.getElementById("root");

var SECTION_KW = ["הערות ותנאים","היקף","מה כלול","מה לא כלול","לוחות זמנים","תנאי תשלום","אבני דרך","עלויות צד שלישי","עלות חודשית","לתשומת לב","אחריות"];
function isHeaderLine(l){ return l.endsWith(":") || (l.length < 34 && SECTION_KW.some(function(k){return l.indexOf(k)===0;})); }
var TERMS_KW = ["הערות ותנאים","לוחות זמנים","תנאי תשלום","אבני דרך","עלויות","לתשומת לב","אחריות","מה לא כלול"];
function splitAtTerms(notes){
  var lines=(notes||"").replace(/\r/g,"").split("\n");
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!isHeaderLine(line)) continue;
    var clean = line.endsWith(":") ? line.slice(0,-1) : line;
    if(TERMS_KW.some(function(k){return clean.indexOf(k)===0;})){
      return { above: lines.slice(0,i).join("\n").trim(), terms: lines.slice(i).join("\n") };
    }
  }
  return { above:"", terms: notes||"" };
}
function renderAbove(text){
  var lines=(text||"").replace(/\r/g,"").split("\n"), out="", header="", isFeat=false, buf=[];
  function flush(){
    if(!header && !buf.length) return;
    if(isFeat){
      out += '<div class="section-label">'+esc(header)+'</div>';
      out += '<table class="feature-table"><thead><tr><th>פיצ\'ר</th><th>מה זה נותן לך</th></tr></thead><tbody>';
      buf.forEach(function(line){
        var parts=line.split(" – ");
        var name=parts[0], desc=parts.length>=2?parts.slice(1).join(" – "):"";
        out += '<tr><td class="feature-name">'+esc(name)+'</td><td class="feature-desc">'+esc(desc)+'</td></tr>';
      });
      out += '</tbody></table>';
    } else {
      var body = buf.map(function(l){return esc(l);}).join("<br>");
      out += '<div class="intro-section"><div class="intro-title">'+esc(header)+'</div><div class="intro-text">'+body+'</div></div>';
    }
    buf=[]; header="";
  }
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line) continue;
    if(isHeaderLine(line)){
      flush();
      header = line.endsWith(":") ? line.slice(0,-1) : line;
      isFeat = header.indexOf("מה כלול")===0 || header.indexOf("היקף")===0 || header.indexOf("פיצ")>=0;
      continue;
    }
    buf.push(line);
  }
  flush();
  return out;
}
function formatNotes(text){
  const kw = ["הערות ותנאים","היקף","לוחות זמנים","תנאי תשלום","אבני דרך","עלויות צד שלישי","עלות חודשית","לתשומת לב","מה כלול","מה לא כלול","אחריות"];
  return (text||"").replace(/\r/g,"").split("\n").map(function(raw){
    const line = raw.trim();
    if(!line) return "";
    const isHeader = line.endsWith(":") || (line.length < 34 && kw.some(function(k){return line.indexOf(k)===0;}));
    const clean = line.endsWith(":") ? line.slice(0,-1) : line;
    return isHeader ? '<div class="nt-h">'+esc(clean)+'</div>' : '<div class="nt-l">'+esc(line)+'</div>';
  }).join("");
}
function shell(inner){
  const today = new Date().toLocaleDateString("he-IL", {day:"numeric",month:"long",year:"numeric"});
  return '<div class="header"><div class="header-top"><img class="logo" src="logo.png" alt="seai" />'+
    '<div><div class="doc-info-label">תאריך</div><div class="doc-info-value">'+today+'</div></div></div>'+ inner +
    '</div><div class="accent-bar"></div>';
}
function errorCard(msg){
  root.innerHTML = shell('<div class="doc-type">Price Quotation · הצעת מחיר</div><div class="project-title">הצעת מחיר</div>')+
    '<div class="body"><div class="banner bad">'+esc(msg)+'</div></div>';
}

function render(data){
  const q = data.quote;
  const rows = (data.items||[]).map(it => {
    const qty = Number(it.quantity ?? 1);
    const mid = (it.notes && it.notes.trim()) ? it.notes : ((qty && qty !== 1) ? (qty + ' × ' + money(it.unit_price_agorot)) : "");
    return '<tr><td class="cat-name">'+esc(it.description||"—")+'</td><td class="cat-pct">'+esc(mid)+'</td><td class="cat-amt">'+money(it.line_total_agorot)+'</td></tr>';
  }).join("") || '<tr><td colspan="3" style="text-align:center;color:#9ca3af">אין שורות</td></tr>';

  let action = "";
  if (data.accepted) action = '<div class="banner ok">✅ ההצעה אושרה. תודה!</div>';
  else if (data.rejected) action = '<div class="banner bad">ההצעה נדחתה.</div>';
  else if (data.expired) action = '<div class="banner bad">תוקף ההצעה פג. פנו אלינו להצעה מעודכנת.</div>';
  else action =
    '<div class="accept-box"><div class="section-label">אישור ההצעה</div>'+
    '<input id="name" class="name-input" placeholder="שם מלא לאישור" autocomplete="name" />'+
    '<button id="acceptBtn" class="accept-btn" onclick="accept()">אני מאשר/ת את ההצעה</button>'+
    '<div class="fineprint">בלחיצה על "אישור" את/ה מאשר/ת את תנאי הצעת המחיר.</div></div>';

  const validUntil = q.valid_until ? '<div class="meta">בתוקף עד '+new Date(q.valid_until).toLocaleDateString("he-IL")+'</div>' : "";
  const split = splitAtTerms(q.notes || "");
  const scopeBlock = renderAbove(split.above);
  const notesBlock = split.terms.trim() ? formatNotes(split.terms) : "";

  root.innerHTML = shell(
    '<div class="doc-type">Price Quotation · הצעת מחיר</div>'+
    '<div class="project-title">'+esc(q.title || "הצעת מחיר")+'</div>'+
    '<div class="project-sub">הצעת מחיר רשמית</div>'+ validUntil
  ) +
  '<div class="body">'+
    scopeBlock +
    '<div class="section-label">פירוט עלות הקמה</div>'+
    '<table class="cat-table"><thead><tr><th>קטגוריה</th><th class="pct-col">אחוז</th><th class="amt-col">עלות</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="section-label">סיכום כספי</div>'+
    '<div class="summary-section">'+
      '<div class="summary-row"><span class="summary-label">סה"כ עלות הקמה</span><span class="summary-value">'+money(q.subtotal_agorot)+'</span></div>'+
      '<div class="summary-row"><span class="summary-label">מע"מ</span><span class="summary-value">פטור · עוסק פטור</span></div>'+
      '<div class="summary-row total"><span class="summary-label">סה"כ לתשלום (חד פעמי)</span><span class="summary-value">'+money(q.total_agorot)+'</span></div>'+
    '</div>'+
    (notesBlock ? '<div class="notes-section">'+notesBlock+'</div>' : "") + action +
  '</div>'+
  '<div class="signature-section"><div class="signature-box">'+
    '<div class="signature-label">חתימה:</div>'+
    '<img class="signature-img" src="signature.png" alt="חתימה" />'+
    '<div class="signature-line"></div>'+
    '<div class="signature-name">seai</div>'+
    '<div class="signature-title">חתימת העסק</div>'+
  '</div></div>'+
  '<div class="footer">seai · הצעת מחיר רשמית</div>';
}

async function accept(){
  const btn = document.getElementById("acceptBtn");
  const name = (document.getElementById("name")||{}).value || "";
  if (!name.trim()){ alert("נא להזין שם מלא"); return; }
  btn.disabled = true; btn.textContent = "שולח…";
  try{
    const res = await fetch(FUNCTION_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ token, name }) });
    const data = await res.json();
    if (data.ok && data.accepted){ load(true); }
    else { btn.disabled=false; btn.textContent="אני מאשר/ת את ההצעה"; alert("האישור נכשל. נסו שוב."); }
  }catch(e){ btn.disabled=false; btn.textContent="אני מאשר/ת את ההצעה"; alert("שגיאת רשת. נסו שוב."); }
}

async function load(justAccepted){
  if (!token){ errorCard("קישור לא תקין"); return; }
  try{
    const res = await fetch(FUNCTION_URL + "?token=" + encodeURIComponent(token));
    const data = await res.json();
    if (!data.ok){ errorCard(data.error === "not_found" ? "ההצעה לא נמצאה" : "קישור לא תקין"); return; }
    if (justAccepted) data.accepted = true;
    render(data);
  }catch(e){ errorCard("אירעה שגיאה. נסו שוב מאוחר יותר."); }
}
load(false);
</script>
</body>
</html>
