<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>הצעת מחיר · seai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Heebo',-apple-system,Arial,sans-serif;background:#f5f5f5;color:#1a1a2e;direction:rtl;padding:20px 12px}
  .page{max-width:760px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.08)}
  .header{background:#1a1a2e;padding:36px 40px 28px;color:#fff}
  .header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:20px}
  .brand{font-size:24px;font-weight:700;letter-spacing:.5px}
  .doc-info-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:3px}
  .doc-info-value{font-size:13px;color:rgba(255,255,255,.85);text-align:left}
  .doc-type{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px}
  .project-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .project-sub{font-size:13px;color:rgba(255,255,255,.5);font-weight:300;margin-top:4px}
  .logo{height:38px;width:auto;filter:brightness(0) invert(1)}
  .accent-bar{height:4px;background:linear-gradient(90deg,#F97316,#fb923c,transparent)}
  .signature-section{padding:28px 40px 8px;display:flex;justify-content:flex-start}
  .signature-box{text-align:center}
  .signature-label{font-size:12px;color:#9ca3af;margin-bottom:6px}
  .signature-img{height:40px;width:auto;display:block}
  .signature-line{width:150px;border-top:1px solid #cbd5e1;margin:4px 0 8px}
  .signature-name{font-size:15px;font-weight:700;color:#1a1a2e}
  .signature-title{font-size:11px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase}
  .body{padding:28px 40px 40px}
  .section-label{font-size:12px;font-weight:600;letter-spacing:1px;color:#F97316;text-transform:uppercase;margin:24px 0 12px}
  .section-label:first-child{margin-top:0}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;text-align:right;padding:8px 6px;border-bottom:2px solid #eef0f3}
  th.amt-col{text-align:left}
  td{padding:12px 6px;border-bottom:1px solid #f1f2f4;font-size:14px;vertical-align:top}
  .cat-name{font-weight:500;color:#1a1a2e}
  .cat-note{font-size:12px;color:#6b7280;font-weight:400;margin-top:3px}
  .cat-pct{color:#6b7280;white-space:nowrap}
  .cat-amt{text-align:left;white-space:nowrap;font-weight:600}
  .summary-section{background:#f8f9fb;border-radius:12px;padding:18px 20px;margin-top:8px}
  .summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#4b5563}
  .summary-row.total{border-top:1px solid #e5e7eb;margin-top:8px;padding-top:14px;font-size:18px;font-weight:700;color:#1a1a2e}
  .summary-row.total .v{color:#F97316}
  .notes-text{font-size:13px;line-height:1.9;color:#374151;white-space:pre-line}
  .nt-h{font-weight:700;color:#1a1a2e;font-size:14px;margin:16px 0 6px}
  .nt-h:first-child{margin-top:0}
  .nt-l{font-size:13px;line-height:1.85;color:#374151}
  .meta{color:rgba(255,255,255,.6);font-size:12px;margin-top:6px}
  .accept-box{margin-top:30px;background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:22px}
  .name-input{width:100%;padding:13px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:12px}
  .accept-btn{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(180deg,#F97316,#ea580c);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
  .accept-btn:disabled{opacity:.6}
  .fineprint{color:#9ca3af;font-size:12px;text-align:center;margin-top:10px}
  .banner{margin-top:24px;padding:16px;border-radius:12px;text-align:center;font-size:15px;font-weight:600}
  .banner.ok{background:#ecfdf5;color:#047857}
  .banner.bad{background:#fef2f2;color:#b91c1c}
  .footer{padding:22px 40px 28px;text-align:center;color:#9ca3af;font-size:12px;border-top:1px solid #f1f2f4}
  .loading{padding:60px 20px;text-align:center;color:#9ca3af}
</style>
</head>
<body>
  <div id="root" class="page"><div class="loading">טוען…</div></div>

<script>
const FUNCTION_URL = "https://puvtgnhrilyabqgtwnmg.supabase.co/functions/v1/quote-public";
const money = a => "₪" + ((a || 0) / 100).toLocaleString("he-IL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = s => (s ?? "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const token = new URLSearchParams(location.search).get("token");
const root = document.getElementById("root");

function formatNotes(text){
  const kw = ["הערות ותנאים","היקף","לוחות זמנים","תנאי תשלום","אבני דרך","עלויות צד שלישי","עלות חודשית","לתשומת לב","מה כלול","מה לא כלול","אחריות"];
  return (text||"").replace(/\r/g,"").split("\n").map(function(raw){
    const line = raw.trim();
    if(!line) return "";
    const isHeader = line.endsWith(":") || (line.length < 34 && kw.some(function(k){return line.indexOf(k)===0;}));
    const clean = line.endsWith(":") ? line.slice(0,-1) : line;
    return isHeader ? '<div class="nt-h">'+esc(clean)+'</div>' : '<div class="nt-l">'+esc(line)+'</div>';
  }).join("");
}
function shell(inner){
  const today = new Date().toLocaleDateString("he-IL", {day:"numeric",month:"long",year:"numeric"});
  return '<div class="header"><div class="header-top"><img class="logo" src="logo.png" alt="seai" />'+
    '<div><div class="doc-info-label">תאריך</div><div class="doc-info-value">'+today+'</div></div></div>'+ inner +
    '</div><div class="accent-bar"></div>';
}
function errorCard(msg){
  root.innerHTML = shell('<div class="doc-type">Price Quotation · הצעת מחיר</div><div class="project-title">הצעת מחיר</div>')+
    '<div class="body"><div class="banner bad">'+esc(msg)+'</div></div>';
}

function render(data){
  const q = data.quote;
  const rows = (data.items||[]).map(it => {
    const note = it.notes ? '<div class="cat-note">'+esc(it.notes)+'</div>' : "";
    const qty = Number(it.quantity ?? 1);
    const detail = (qty && qty !== 1) ? (qty + ' × ' + money(it.unit_price_agorot)) : "";
    return '<tr><td class="cat-name">'+esc(it.description||"—")+note+'</td><td class="cat-pct">'+detail+'</td><td class="cat-amt">'+money(it.line_total_agorot)+'</td></tr>';
  }).join("") || '<tr><td colspan="3" style="text-align:center;color:#9ca3af">אין שורות</td></tr>';

  let action = "";
  if (data.accepted) action = '<div class="banner ok">✅ ההצעה אושרה. תודה!</div>';
  else if (data.rejected) action = '<div class="banner bad">ההצעה נדחתה.</div>';
  else if (data.expired) action = '<div class="banner bad">תוקף ההצעה פג. פנו אלינו להצעה מעודכנת.</div>';
  else action =
    '<div class="accept-box"><div class="section-label">אישור ההצעה</div>'+
    '<input id="name" class="name-input" placeholder="שם מלא לאישור" autocomplete="name" />'+
    '<button id="acceptBtn" class="accept-btn" onclick="accept()">אני מאשר/ת את ההצעה</button>'+
    '<div class="fineprint">בלחיצה על "אישור" את/ה מאשר/ת את תנאי הצעת המחיר.</div></div>';

  const validUntil = q.valid_until ? '<div class="meta">בתוקף עד '+new Date(q.valid_until).toLocaleDateString("he-IL")+'</div>' : "";
  const notesBlock = q.notes ? '<div class="section-label">הערות ותנאים</div>'+formatNotes(q.notes) : "";

  root.innerHTML = shell(
    '<div class="doc-type">Price Quotation · הצעת מחיר</div>'+
    '<div class="project-title">'+esc(q.title || "הצעת מחיר")+'</div>'+
    '<div class="project-sub">הצעת מחיר רשמית</div>'+ validUntil
  ) +
  '<div class="body">'+
    '<div class="section-label">פירוט</div>'+
    '<table><thead><tr><th>תיאור</th><th>פירוט</th><th class="amt-col">עלות</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="section-label">סיכום כספי</div>'+
    '<div class="summary-section">'+
      '<div class="summary-row"><span>סכום ביניים</span><span>'+money(q.subtotal_agorot)+'</span></div>'+
      '<div class="summary-row"><span>מע"מ</span><span>פטור · עוסק פטור</span></div>'+
      '<div class="summary-row total"><span>סה"כ לתשלום</span><span class="v">'+money(q.total_agorot)+'</span></div>'+
    '</div>'+
    notesBlock + action +
  '</div>'+
  '<div class="signature-section"><div class="signature-box">'+
    '<div class="signature-label">חתימה:</div>'+
    '<img class="signature-img" src="signature.png" alt="חתימה" />'+
    '<div class="signature-line"></div>'+
    '<div class="signature-name">seai</div>'+
    '<div class="signature-title">חתימת העסק</div>'+
  '</div></div>'+
  '<div class="footer">seai · הצעת מחיר רשמית</div>';
}

async function accept(){
  const btn = document.getElementById("acceptBtn");
  const name = (document.getElementById("name")||{}).value || "";
  if (!name.trim()){ alert("נא להזין שם מלא"); return; }
  btn.disabled = true; btn.textContent = "שולח…";
  try{
    const res = await fetch(FUNCTION_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ token, name }) });
    const data = await res.json();
    if (data.ok && data.accepted){ load(true); }
    else { btn.disabled=false; btn.textContent="אני מאשר/ת את ההצעה"; alert("האישור נכשל. נסו שוב."); }
  }catch(e){ btn.disabled=false; btn.textContent="אני מאשר/ת את ההצעה"; alert("שגיאת רשת. נסו שוב."); }
}

async function load(justAccepted){
  if (!token){ errorCard("קישור לא תקין"); return; }
  try{
    const res = await fetch(FUNCTION_URL + "?token=" + encodeURIComponent(token));
    const data = await res.json();
    if (!data.ok){ errorCard(data.error === "not_found" ? "ההצעה לא נמצאה" : "קישור לא תקין"); return; }
    if (justAccepted) data.accepted = true;
    render(data);
  }catch(e){ errorCard("אירעה שגיאה. נסו שוב מאוחר יותר."); }
}
load(false);
</script>
</body>
</html>
